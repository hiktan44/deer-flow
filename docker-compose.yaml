# DeerFlow — Coolify Production Deployment
# Tüm API key'ler Coolify Environment Variables üzerinden geçirilir
# .env dosyasına bağımlılık YOK

services:
  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: deer-flow-nginx
    ports:
      - "${PORT:-2026}:2026"
    depends_on:
      gateway:
        condition: service_started
      frontend:
        condition: service_started
      langgraph:
        condition: service_started
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2026/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Frontend: Next.js Production ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
      args:
        PNPM_STORE_PATH: /root/.local/share/pnpm/store
    container_name: deer-flow-frontend
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-defaultsecret123456789012345678901234567890}
    networks:
      - deer-flow
    restart: unless-stopped

  # ── Gateway API ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: deer-flow-gateway
    command: sh -c "cd backend && uv run uvicorn src.gateway.app:app --host 0.0.0.0 --port 8001 --workers 2"
    volumes:
      - ./config.production.yaml:/app/backend/config.yaml:ro
      - ./extensions_config.production.json:/app/backend/extensions_config.json:ro
      - ./skills:/app/skills:ro
      - deer-flow-data:/app/backend/.deer-flow
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── LangGraph Server ───────────────────────────────────────────────────────
  langgraph:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: deer-flow-langgraph
    command: sh -c "cd /app/backend && uv run langgraph dev --no-browser --allow-blocking --no-reload --host 0.0.0.0 --port 2024"
    volumes:
      - ./config.production.yaml:/app/config.yaml:ro
      - ./extensions_config.production.json:/app/extensions_config.json:ro
      - deer-flow-data:/app/backend/.deer-flow
      - ./skills:/app/skills:ro
      - langgraph-api-data:/app/backend/.langgraph_api
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/extensions_config.json
      - LANGCHAIN_TRACING_V2=false
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    networks:
      - deer-flow
    restart: unless-stopped

volumes:
  deer-flow-data:
    driver: local
  langgraph-api-data:
    driver: local

networks:
  deer-flow:
    driver: bridge
